events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # 内部接口拦截（不对外暴露）—— ^~ 确保优先于正则 location，OPTIONS 预检也拦截
        location ^~ /api/shop/internal/ {
            default_type application/json;
            return 403 '{"code":40301,"message":"无操作权限","data":null}';
        }

        # 电商服务
        location /api/shop/ {
            proxy_pass http://shop-service:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS 头（always 确保非 200 响应也生效）
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;

            # CORS 预检请求直接返回 204
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # 健康检查
        location /health {
            proxy_pass http://shop-service:8001/health;
            proxy_set_header Host $host;
        }
    }
}
