services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shop-service
      - rag-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  shop-service:
    build: ./shop-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://user:1234@postgres:5432/agent
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-dev-internal-token-change-in-production}
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rag-service:
    build:
      context: .
      dockerfile: rag/Dockerfile
    environment:
      - MODEL_BASE_URL=${MODEL_BASE_URL:-https://api.deepseek.com/v1}
      - MODEL_API_KEY=${MODEL_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
      - RAG_RESOURCE_DIR=rag_resource
      - RAG_DB_DIR=rag_db
      - RAG_COLLECTION_NAME=faq
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_BM25_K1=${RAG_BM25_K1:-1.5}
      - RAG_BM25_B=${RAG_BM25_B:-0.75}
      - RETRIEVER_MODE=${RETRIEVER_MODE:-hybrid}
      - RETRIEVER_RRF_K=${RETRIEVER_RRF_K:-60}
      - API_PORT=8000
      - SHOP_SERVICE_URL=http://shop-service:8001
    ports:
      - "8000:8000"
    volumes:
      - ./rag_resource:/app/rag_resource:ro
      - ragdb:/app/rag_db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  ragdb:
